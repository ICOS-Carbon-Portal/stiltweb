@import se.lu.nateko.cp.viewscore.ImportVersions._

@(title: String)(customHeader: Html)(body: Html)
<!DOCTYPE html>
<html lang="en">
	<head>
		<link rel="stylesheet" href="https://static.icos-cp.eu/css/bootstrap/@{bootstrapCSS}/icos-bootstrap.css">
		<link rel="stylesheet" href="https://static.icos-cp.eu/constant/fontawesome/@{fontAwesome}/css/all.min.css">

		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		@customHeader

		<title>@title</title>

		<!-- Matomo -->
		<script>
			var _paq = window._paq = window._paq || [];
			/* tracker methods like "setCustomDimension" should be called before "trackPageView" */
			_paq.push(['trackPageView']);
			_paq.push(['enableLinkTracking']);
			(function () {
				var u = "//matomo.icos-cp.eu/";
				_paq.push(['setTrackerUrl', u + 'matomo.php']);
				_paq.push(['setSiteId', '8']);
				var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0];
				g.async = true; g.src = u + 'matomo.js'; s.parentNode.insertBefore(g, s);
			})();
		</script>
		<!-- End Matomo Code -->

	</head>

	<body>
		@body
	</body>

</html>
